<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDP SLOT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムCSS設定 */
        :root {
            /* 上マージンは外部ページから上書き可能にする */
            --slot-top-offset: 6vh;
            --slot-color: #ff0000;
            --panel-color: #ffffff;
            --panel-border: #000000;
            --button-default: #000000;
            --button-disabled: #808080;
        }

        /* ラッパー: ページ内でスロットの上マージンを確保します。
           他ページに組み込む際は :root { --slot-top-offset: ... } で調整してください。 */
        #app-wrapper {
            padding-top: var(--slot-top-offset);
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            align-items: flex-start;
            /* 内部を上寄せ */
            justify-content: center;
        }

        body {
            font-family: sans-serif;
            background-color: #2d3748;
            /* 背景色 */
            margin: 0;
            overflow: hidden;
            touch-action: none;
            /* スマホでのスクロール防止 */
        }

        /* スロットマシン本体 */
        #slot-machine {
            background-color: var(--slot-color);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 5px 15px rgba(255, 255, 255, 0.3);
            border: 4px solid #cc0000;
        }

        /* パネル枠 */
        .panel-container {
            background-color: var(--panel-color);
            border: 4px solid var(--panel-border);
            border-radius: 8px;
            position: relative;
            /* 3要素分(上下半分+中央)を見せるための高さ */
            height: 276px;
            overflow: hidden;
            isolation: isolate;
        }

        .panel-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.95) 0%,
                    rgba(0, 0, 0, 0) 15%,
                    rgba(0, 0, 0, 0) 85%,
                    rgba(0, 0, 0, 0.95) 100%);
        }

        /* スクロールするリスト */
        .slot-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            will-change: transform;
        }

        .slot-item {
            height: 92px;
            /* 1アイテムの高さ (276px / 3) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            box-sizing: border-box;
            position: relative;
            width: 100%;
        }

        .word-container {
            display: grid;
            grid-template-columns: 30% 70%;
            align-items: baseline;
            width: 100%;
        }

        .word-initial {
            font-size: 2.2rem;
            color: #000;
            text-align: right;
            padding-right: 2px;
        }

        .word-rest {
            font-size: 1.2rem;
            text-align: left;
            padding-left: 2px;
        }

        .ruby-text {
            font-size: 0.75rem;
            color: #555;
            position: absolute;
            bottom: 4px;
            opacity: 0;
            /* 初期状態は非表示 */
            transition: opacity 0.3s;
        }

        .ruby-visible .ruby-text {
            opacity: 1;
        }

        /* 停止ボタン */
        .stop-btn {
            background-color: var(--button-default);
            border: 2px solid #555;
            box-shadow: 0 4px 0 #222;
            transition: all 0.1s;
        }

        .stop-btn:active,
        .stop-btn.pressed {
            transform: translateY(4px);
            box-shadow: 0 0 0 #222;
        }

        .stop-btn:disabled,
        .stop-btn.disabled-visual {
            background-color: var(--button-disabled);
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: 0 0 0 #222;
        }

        /* レバー */
        #lever-wrapper {
            position: relative;
            width: 60px;
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 150;
            /* オーバーレイより上 */
            cursor: pointer;
        }

        #lever-slot {
            width: 20px;
            height: 250px;
            background-color: #1a202c;
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        #lever-rod {
            width: 14px;
            height: 200px;
            /* 80%の長さ */
            background: linear-gradient(to right, #999, #eee, #999);
            position: absolute;
            bottom: 20px;
            transform-origin: bottom center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 7px;
        }

        .lever-pulled #lever-rod {
            transform: rotateX(180deg) scaleY(0.5);
            /* 倒れる表現 */
        }

        #lever-head {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            border-radius: 50%;
            position: absolute;
            top: -25px;
            left: -18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s, color 0.3s;
        }

        /* スタート画面のみ: SETの明滅 */
        @keyframes leverIdlePulse {

            0%,
            100% {
                color: rgba(255, 255, 255, 0.5);
                box-shadow:
                    0 5px 10px rgba(0, 0, 0, 0.5),
                    0 0 0 rgba(255, 220, 80, 0);
            }

            50% {
                color: #ffffff;
                box-shadow:
                    0 5px 10px rgba(0, 0, 0, 0.5),
                    0 0 18px 4px rgba(255, 235, 9, 0.75),
                    inset 0 0 8px rgba(255, 229, 28, 0.4);
            }
        }

        #lever-head.lever-idle {
            animation: leverIdlePulse 1.4s ease-in-out infinite;
        }

        /* オーバーレイ */
        #production-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }

        .overlay-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 演出テキストエフェクト */
        .effect-gold {
            text-shadow: 0px 0px 10px rgba(252, 246, 186, 0.8);
        }

        .effect-gold .word-initial,
        .effect-gold .word-rest {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 10px rgba(252, 246, 186, 0.8);
            animation: shine 2s infinite linear;
            background-size: 200% auto;
            /* 黒フチ + 影 */
            filter:
                drop-shadow(-0.5px -0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(0.5px -0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(-0.5px 0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(0.5px 0.5px 0 rgba(60, 60, 100, 0.4));
        }

        .effect-rainbow {
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.5);
        }

        .effect-rainbow .word-initial,
        .effect-rainbow .word-rest {
            background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 12px rgba(255, 255, 255, 0.7);
            animation: shine 2s infinite linear;
            background-size: 200% auto;
            /* 黒フチ + 影 */
            filter:
                drop-shadow(-0.5px -0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(0.5px -0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(-0.5px 0.5px 0 rgba(60, 60, 100, 0.4)) drop-shadow(0.5px 0.5px 0 rgba(60, 60, 100, 0.4));
        }

        .stop-btn.button-win-gold {
            animation: buttonPulseGold 0.9s ease-in-out infinite;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.95);
        }

        .stop-btn.button-win-yellow {
            animation: buttonPulseYellow 0.9s ease-in-out infinite;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.95);
        }

        .stop-btn .btn-label {
            display: inline-block;
            transform-origin: center center;
            will-change: transform;
        }

        .stop-btn.button-near-miss .btn-label {
            animation: buttonGlowPulse 0.7s ease-in-out infinite;
            color: #fff3a6;
            text-shadow: 0 0 10px rgba(255, 243, 166, 0.95);
        }

        .word-container.near-miss-wobble {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.1em;
            width: auto;
            white-space: nowrap;
            animation: nearMissWobble 0.35s ease-in-out infinite;
            transform-origin: center center;
            will-change: transform;
        }

        .slot-item.jackpot-center-only {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .panel-container.win-gold {
            animation: panelFlashGold 0.8s ease-out;
            box-shadow: 0 0 0 6px rgba(255, 215, 0, 0.75), 0 0 24px rgba(255, 215, 0, 0.85);
            border-color: #ffd700;
        }

        .panel-container.win-rainbow {
            animation: panelFlashRainbow 0.8s ease-out;
            box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.8), 0 0 24px rgba(255, 255, 255, 0.95);
            border-color: #ffffff;
        }

        .panel-container.win-white {
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.95), 0 0 34px rgba(255, 255, 255, 0.9);
        }

        .screen-shake {
            animation: screenShake 0.5s ease-out;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes nearMissWobble {

            0%,
            100% {
                transform: translateX(0) rotate(0deg);
            }

            25% {
                transform: translateX(-4px) rotate(-2deg);
            }

            50% {
                transform: translateX(4px) rotate(2deg);
            }

            75% {
                transform: translateX(-3px) rotate(-1deg);
            }
        }

        @keyframes screenShake {

            0%,
            100% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-6px, -4px);
            }

            40% {
                transform: translate(6px, 4px);
            }

            60% {
                transform: translate(-4px, 2px);
            }

            80% {
                transform: translate(4px, -2px);
            }
        }

        @keyframes buttonPulseGold {

            0%,
            100% {
                box-shadow: 0 4px 0 #222, 0 0 0 rgba(255, 215, 0, 0);
            }

            50% {
                box-shadow: 0 4px 0 #222, 0 0 18px rgba(255, 215, 0, 0.9);
            }
        }

        @keyframes buttonPulseYellow {

            0%,
            100% {
                box-shadow: 0 4px 0 #222, 0 0 0 rgba(255, 215, 0, 0);
            }

            50% {
                box-shadow: 0 4px 0 #222, 0 0 18px rgba(255, 215, 0, 0.9);
            }
        }

        @keyframes buttonGlowPulse {

            0%,
            100% {
                text-shadow: 0 0 0 rgba(255, 243, 166, 0);
            }

            50% {
                text-shadow: 0 0 14px rgba(255, 243, 166, 0.95);
            }
        }

        @keyframes panelFlashGold {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.6);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(255, 215, 0, 0.8), 0 0 24px rgba(255, 215, 0, 0.95);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
            }
        }

        @keyframes panelFlashRainbow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.9), 0 0 24px rgba(255, 255, 255, 1);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        /* 紙吹雪キャンバス */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* キラキラキャンバス */
        #sparkle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 55;
        }

        /* 当たりフラッシュオーバーレイ */
        #win-flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            pointer-events: none;
            z-index: 90;
            opacity: 0;
        }

        @keyframes winFlash {
            0% {
                opacity: 1;
            }

            /* 発光、1回目 開始 */
            33.33% {
                opacity: 0;
            }

            /* 発光、1回目 終了 (0.5s) */
            49.99% {
                opacity: 0;
            }

            /* 休み 終了 (0.75s) */
            50% {
                opacity: 1;
            }

            /* 発光、2回目 開始 (即時切り替え) */
            100% {
                opacity: 0;
            }

            /* 発光、2回目 終了 (1.5s) */
        }

        .win-flash-active {
            animation: winFlash 1.5s linear forwards;
        }

        /* アイコンリンクボタン */
        #icon-link-btn {
            position: relative;
            background: linear-gradient(145deg, #9a9a9a, #707070);
            border-radius: 12px;
            border: 3px solid #555;
            cursor: pointer;
            width: auto;
            height: auto;
            overflow: hidden;
            box-shadow: 0 5px 0 #3a3a3a, 0 7px 14px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.1s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 10px;
        }

        #icon-link-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #3a3a3a, 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        #icon-img {
            width: auto;
            height: 50px;
            object-fit: contain;
            transition: filter 0.4s ease;
            pointer-events: none;
            display: block;
        }

        #icon-img.win-color {
            filter: invert(1) sepia(1) saturate(15) hue-rotate(5deg);
        }

        /* アイコンボタンのラッパー */
        #icon-btn-wrapper {
            margin-top: 64px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- 当たりフラッシュオーバーレイ -->
    <div id="win-flash-overlay"></div>

    <!-- キラキラキャンバス -->
    <canvas id="sparkle-canvas"></canvas>

    <!-- 本番用オーバーレイ -->
    <div id="production-overlay">
        <h1 class="text-white text-5xl md:text-7xl font-bold mb-8 tracking-widest">What Is EDP?</h1>
    </div>

    <!-- 紙吹雪用キャンバス -->
    <canvas id="confetti-canvas"></canvas>

    <div id="app-wrapper">
        <div class="flex items-end justify-center gap-8 h-full pb-20 md:pb-0 md:items-center">

            <!-- スロットマシン本体 -->
            <div id="slot-machine" class="p-6 md:p-10 flex flex-col items-center relative z-10">
                <!-- パネルコンテナ (E, D, P) -->
                <div class="flex gap-2 md:gap-4 mb-6">
                    <!-- E列 -->
                    <div class="flex flex-col items-center gap-8">
                        <div class="panel-container w-32 md:w-48 bg-white">
                            <ul id="slot-list-e" class="slot-list"></ul>
                        </div>
                        <button id="btn-stop-e"
                            class="stop-btn w-16 h-16 md:w-20 md:h-20 rounded-full text-white font-bold text-xl md:text-2xl cursor-pointer outline-none"><span
                                class="btn-label">E</span></button>
                    </div>
                    <!-- D列 -->
                    <div class="flex flex-col items-center gap-8">
                        <div class="panel-container w-32 md:w-48 bg-white">
                            <ul id="slot-list-d" class="slot-list"></ul>
                        </div>
                        <button id="btn-stop-d"
                            class="stop-btn w-16 h-16 md:w-20 md:h-20 rounded-full text-white font-bold text-xl md:text-2xl cursor-pointer outline-none"><span
                                class="btn-label">D</span></button>
                    </div>
                    <!-- P列 -->
                    <div class="flex flex-col items-center gap-8">
                        <div class="panel-container w-32 md:w-48 bg-white">
                            <ul id="slot-list-p" class="slot-list"></ul>
                        </div>
                        <button id="btn-stop-p"
                            class="stop-btn w-16 h-16 md:w-20 md:h-20 rounded-full text-white font-bold text-xl md:text-2xl cursor-pointer outline-none"><span
                                class="btn-label">P</span></button>
                    </div>
                </div>

                <div id="icon-btn-wrapper">
                    <button id="icon-link-btn" onclick="handleIconClick()">
                        <img id="icon-img" src="icon.png" alt="EDP">
                    </button>
                </div>
            </div>

            <!-- レバー -->
            <div id="lever-wrapper" onclick="triggerEvent('start')">
                <div id="lever-slot"></div>
                <div id="lever-rod">
                    <div id="lever-head" class="lever-idle">SET</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // -----------------------------------------------------------------
        // 1. データと要件定義の読み込み (JSONをオブジェクトとして定義)
        // -----------------------------------------------------------------
        const CONFIG = {
            "slot": {
                "rotationDirection": "down",
                "rotationTimePerCycle": 1200, // 1周1200ms
                "stopDuration": 2000,        // 停止時2000msかけて減速
                "alignCenterOnStop": true
            },
            "buttons": {
                "defaultColor": "#000000",
                "disabledColor": "#808080"
            },
            "lever": { "label": "SET", "lengthRatio": 0.8 },
            "theme": { "slotColor": "#ff0000", "panelColor": "#ffffff", "panelBorderColor": "#000000", "fontFamily": "sans-serif", "highlightInitial": true },
            "display": { "showNeighborItems": true, "showRuby": true, "separateRubyObject": true },
            "input": {
                "keyboardEnabled": true,
                "mapping": { "start": "KeyS", "stopE": "KeyE", "stopD": "KeyD", "stopP": "KeyP" }
            },
            "sound": {
                "engine": "speechSynthesis",
                "voice": { "lang": "ja-JP", "rate": 1.5, "pitch": 1.0, "volume": 1.0 },
                "beep": { "volume": 0.9 },
                "events": {
                    "lever": "ガチャン",
                    "stop": "ピッ",
                    "patternA": "Electronic Data Processing",
                    "patternB": "Echigo Dangerous People"
                }
            },
            "jackpot": {
                "judgeTiming": "afterLastStop",
                "patterns": [
                    ["Electronic", "Data", "Processing"],
                    ["Echigo", "Dangerous", "People"]
                ],
                "effects": {
                    "patternA": { "textEffect": "gold", "useConfetti": true },
                    "patternB": { "textEffect": "rainbow", "useConfetti": true }
                }
            },
            "production": {
                "blackOverlay": true,
                "overlayText": "What Is EDP?",
                "requireLeverClick": true
            }
        };

        const WORD_DATA = {
            "E": [
                { "word": "Echigo", "ruby": "越後", "ruby_roman": "Echigo" },
                { "word": "Eikaiwa", "ruby": "英会話", "ruby_roman": "Eikaiwa" },
                { "word": "Electronic", "ruby": "電子", "ruby_roman": "Electronic" },
                { "word": "Egoist", "ruby": "エゴイスト", "ruby_roman": "Egoist" },
                { "word": "Engineer", "ruby": "エンジニア", "ruby_roman": "Engineer" }
            ],
            "D": [
                { "word": "Dangerous", "ruby": "デンジャラス", "ruby_roman": "Dangerous" },
                { "word": "Dopamine", "ruby": "ドーパミン", "ruby_roman": "Dopamine" },
                { "word": "Data", "ruby": "データ", "ruby_roman": "Data" },
                { "word": "Dokagui", "ruby": "ドカ食い", "ruby_roman": "Dokagui" },
                { "word": "Dance", "ruby": "ダンス", "ruby_roman": "Dance" },
                { "word": "Deadline", "ruby": "締め切り", "ruby_roman": "Deadline" },
                { "word": "Donguri", "ruby": "どんぐり", "ruby_roman": "Donguri" }
            ],
            "P": [
                { "word": "People", "ruby": "ピーポー", "ruby_roman": "People" },
                { "word": "Plan", "ruby": "計画", "ruby_roman": "Plan" },
                { "word": "Paradise", "ruby": "パラダイス", "ruby_roman": "Paradise" },
                { "word": "Problem", "ruby": "問題", "ruby_roman": "Problem" },
                { "word": "Processing", "ruby": "処理", "ruby_roman": "Processing" },
                { "word": "Panic", "ruby": "パニック", "ruby_roman": "Panic" },
            ]
        };

        // -----------------------------------------------------------------
        // 2. システム定数・状態管理
        // -----------------------------------------------------------------
        const ITEM_HEIGHT = 92; // 1アイテムの高さ(px)
        const LOOP_COUNT = 20;  // 描画用に配列をループさせる回数（シームレス化により削減）

        const state = {
            isOverlayActive: CONFIG.production.blackOverlay,
            isPlaying: false,
            forceResult: null, // テスト用強制フラグ
            fullReadTimeout: null,
            columns: {
                'e': { id: 'e', words: WORD_DATA.E, isSpinning: false, isStopped: false, isSettled: false, currentPos: 0, velocity: 0, resultIndex: 0, element: null, centerWord: '', stoppedWord: '', targetWord: '', resultWord: '' },
                'd': { id: 'd', words: WORD_DATA.D, isSpinning: false, isStopped: false, isSettled: false, currentPos: 0, velocity: 0, resultIndex: 0, element: null, centerWord: '', stoppedWord: '', targetWord: '', resultWord: '' },
                'p': { id: 'p', words: WORD_DATA.P, isSpinning: false, isStopped: false, isSettled: false, currentPos: 0, velocity: 0, resultIndex: 0, element: null, centerWord: '', stoppedWord: '', targetWord: '', resultWord: '' }
            },
            animationFrameId: null,
            lastTime: 0,
            outcomeEffectsPlayed: false,
            isWin: false
        };

        // -----------------------------------------------------------------
        // 3. UIの初期化と描画
        // -----------------------------------------------------------------
        function initDOM() {
            ['e', 'd', 'p'].forEach(col => {
                const listEl = document.getElementById(`slot-list-${col}`);
                state.columns[col].element = listEl;

                // 無限スクロール用に配列を複数回展開してDOMを生成
                let html = '';
                // 最初は少し余裕をもたせるために先頭にダミーを追加（パチスロ風の見た目のため）
                const totalItems = state.columns[col].words.length * LOOP_COUNT;

                for (let i = 0; i < totalItems; i++) {
                    const wordObj = state.columns[col].words[i % state.columns[col].words.length];
                    const initial = wordObj.word.charAt(0);
                    const rest = wordObj.word.slice(1);

                    html += `
                        <li class="slot-item" id="item-${col}-${i}">
                            <div class="word-container">
                                <span class="word-initial" data-original-initial="${initial}">${initial}</span>
                                <span class="word-rest" data-original-rest="${rest}">${rest}</span>
                            </div>
                            <span class="ruby-text">${wordObj.ruby}</span>
                        </li>
                    `;
                }
                listEl.innerHTML = html;

                // 初期位置：最初の要素が中央(ITEM_HEIGHT * 1)にくるように調整。
                // コンテナの高さは ITEM_HEIGHT * 3 で、中央は 1 のインデックス位置。
                // translateY = -(item_index * ITEM_HEIGHT) + ITEM_HEIGHT(オフセット)
                updateColumnPosition(col, 0);
            });

            // ボタンのイベントリスナー（UIと内部イベントの分離）
            document.getElementById('btn-stop-e').addEventListener('click', () => triggerEvent('stopE'));
            document.getElementById('btn-stop-d').addEventListener('click', () => triggerEvent('stopD'));
            document.getElementById('btn-stop-p').addEventListener('click', () => triggerEvent('stopP'));
        }

        function updateColumnPosition(colId, indexOrPos, isPos = false) {
            const col = state.columns[colId];
            if (isPos) {
                col.currentPos = indexOrPos;
            } else {
                col.currentPos = indexOrPos * ITEM_HEIGHT;
            }
            // CSSの仕様上、下方向に回転 = リスト全体が上へ移動する (translateYがマイナス)
            // 視覚的に中央（インデックス1の位置）に合わせるため ITEM_HEIGHT 分オフセットする
            col.element.style.transform = `translateY(${-(col.currentPos) + ITEM_HEIGHT}px)`;
        }

        // -----------------------------------------------------------------
        // 4. イベント管理 (ロジックとUIの分離)
        // -----------------------------------------------------------------
        function triggerEvent(eventName) {
            switch (eventName) {
                case 'start':
                    if (state.isOverlayActive) {
                        removeOverlay();
                    }
                    if (!state.isPlaying) {
                        startSlot();
                    }
                    break;
                case 'stopE': stopSlot('e'); break;
                case 'stopD': stopSlot('d'); break;
                case 'stopP': stopSlot('p'); break;
                case 'forcePatternA':
                    state.forceResult = 'patternA';
                    console.log('Force Jackpot: Pattern A');
                    break;
                case 'forcePatternB':
                    state.forceResult = 'patternB';
                    console.log('Force Jackpot: Pattern B');
                    break;
            }
        }

        function removeOverlay() {
            state.isOverlayActive = false;
            const overlay = document.getElementById('production-overlay');
            overlay.classList.add('overlay-hidden');
            // SET明滅を停止
            const leverHead = document.getElementById('lever-head');
            if (leverHead) leverHead.classList.remove('lever-idle');
            // 初回インタラクションで音声の許可を取るため、無音再生
            unlockSpeech();
        }

        // キーボード対応
        window.addEventListener('keydown', (e) => {
            const code = e.code;
            if (code === CONFIG.input.mapping.start) triggerEvent('start');
            else if (code === CONFIG.input.mapping.stopE) triggerEvent('stopE');
            else if (code === CONFIG.input.mapping.stopD) triggerEvent('stopD');
            else if (code === CONFIG.input.mapping.stopP) triggerEvent('stopP');
            // テスト用隠しコマンド
            else if (code === 'KeyA') triggerEvent('forcePatternA');
            else if (code === 'KeyB') triggerEvent('forcePatternB');
        });

        // -----------------------------------------------------------------
        // 5. スロット制御ロジック
        // -----------------------------------------------------------------
        function startSlot() {
            state.isPlaying = true;
            state.forceResult = null; // テスト用強制フラグをリセット
            state.outcomeEffectsPlayed = false;
            // 新しいプレイ開始時は保留中の全体読み上げをクリア
            if (state.fullReadTimeout) {
                clearTimeout(state.fullReadTimeout);
                state.fullReadTimeout = null;
            }
            // 優先して既存の合成音声をキャンセル
            if (window.speechSynthesis) window.speechSynthesis.cancel();

            // レバー演出: .lever-pulled のアニメーションを 750ms 維持して倒れた状態を見せる
            const lever = document.getElementById('lever-wrapper');
            lever.classList.add('lever-pulled');
            setTimeout(() => lever.classList.remove('lever-pulled'), 750);

            // 音声: レバーは従来どおりTTSで "ガチャン" と読み上げる
            speak(CONFIG.sound.events.lever);

            // 初期化
            resetVisualEffects();
            stopConfetti();
            triggerLeverReaction();

            ['e', 'd', 'p'].forEach(col => {
                const c = state.columns[col];
                c.isSpinning = true;
                c.isStopped = false;
                c.isSettled = false;
                c.centerWord = '';
                c.stoppedWord = '';
                c.targetWord = '';
                c.resultWord = '';

                // ボタン初期化
                const btn = document.getElementById(`btn-stop-${col}`);
                btn.classList.remove('disabled-visual', 'pressed');
                btn.disabled = false;

                // 速度計算：1周500ms
                // 1秒あたりの移動ピクセル数 = (アイテム数 * 高) / (500ms / 1000)
                const totalHeightPerCycle = c.words.length * ITEM_HEIGHT;
                c.velocity = totalHeightPerCycle / (CONFIG.slot.rotationTimePerCycle / 1000);
            });

            state.lastTime = performance.now();
            if (!state.animationFrameId) {
                state.animationFrameId = requestAnimationFrame(animationLoop);
            }
        }

        function triggerLeverReaction() {
            const wrapper = document.getElementById('app-wrapper');
            if (wrapper) {
                wrapper.classList.remove('screen-shake');
                void wrapper.offsetWidth;
                wrapper.classList.add('screen-shake');
            }
            playBeep('lever');
        }

        function stopSlot(colId) {
            const col = state.columns[colId];
            if (!state.isPlaying || !col.isSpinning || col.isStopped) return;

            col.isStopped = true;
            const oneCycle = col.words.length;
            const currentAbsolute = Math.round(col.currentPos / ITEM_HEIGHT);
            const halfCycle = Math.round(oneCycle / 2);
            let targetItemIndex = currentAbsolute + halfCycle;

            if (state.forceResult) {
                const patternIdx = state.forceResult === 'patternA' ? 0 : 1;
                const colIdxMap = { 'e': 0, 'd': 1, 'p': 2 };
                const targetWordStr = CONFIG.jackpot.patterns[patternIdx][colIdxMap[colId]];
                const wordIndex = col.words.findIndex(w => w.word === targetWordStr);
                if (wordIndex !== -1) {
                    const currentMod = targetItemIndex % col.words.length;
                    let diff = wordIndex - currentMod;
                    if (diff < 0) diff += col.words.length;
                    targetItemIndex += diff;
                }
            }

            const targetWord = col.words[targetItemIndex % col.words.length]?.word || '';
            col.targetWord = targetWord;
            col.stoppedWord = targetWord;
            col.resultWord = targetWord;
            const matchedIndex = col.words.findIndex(w => w.word === targetWord);
            if (matchedIndex !== -1) {
                col.resultIndex = matchedIndex;
            }

            // ボタンの視覚変更
            const btn = document.getElementById(`btn-stop-${colId}`);
            btn.classList.add('disabled-visual', 'pressed');
            btn.disabled = true;

            // 停止音はWebAudioで即時再生
            playBeep('stop');

            // 停止目標位置の計算
            col.targetPos = targetItemIndex * ITEM_HEIGHT;
            col.stopStartTime = performance.now();
            col.startPos = col.currentPos;
            // 停止開始時の速度を保存して、滑らかな等加速度減速を計算する
            col.stopInitialVelocity = col.velocity || 0;
        }

        function animationLoop(timestamp) {
            const deltaTime = (timestamp - state.lastTime) / 1000; // 秒
            state.lastTime = timestamp;

            const hasPendingAnimation = ['e', 'd', 'p'].some(colId => {
                const col = state.columns[colId];
                return col.isSpinning || !!col.settleAnimId;
            });

            ['e', 'd', 'p'].forEach(colId => {
                const col = state.columns[colId];
                if (!col.isSpinning) return;

                if (!col.isStopped) {
                    // 通常回転
                    col.currentPos += col.velocity * deltaTime;

                    // 無限スクロールのシームレスループ処理
                    // 2周分を超えたら1周分巻き戻すことで、DOM要素の枯渇（空白化）を防ぐ
                    const oneCycleHeight = col.words.length * ITEM_HEIGHT;
                    if (col.currentPos >= oneCycleHeight * 2) {
                        col.currentPos -= oneCycleHeight;
                    }
                } else {
                    // 減速処理: 現在の回転速度を引き継ぎ、等加速度運動で目標位置へ滑らかに到達させる
                    const elapsedMs = timestamp - col.stopStartTime;
                    const T = CONFIG.slot.stopDuration; // ms
                    const t = Math.min(Math.max(elapsedMs, 0), T) / 1000; // 秒

                    const s = col.targetPos - col.startPos; // 目標までの距離(px)
                    const v0 = col.stopInitialVelocity || 0; // px/s

                    // 加速度 a を求める: s = v0*T + 0.5*a*T^2  (T in seconds)
                    const Tsec = Math.max(T / 1000, 0.0001);
                    const a = (2 * (s - v0 * Tsec)) / (Tsec * Tsec);

                    // 位置と現在速度を計算
                    col.currentPos = col.startPos + v0 * t + 0.5 * a * t * t;
                    col.velocity = v0 + a * t; // 更新（念のため）

                    if (elapsedMs >= T) {
                        col.currentPos = col.targetPos;
                        col.isSpinning = false;
                        // 最終停止時の処理
                        finalizeStop(colId);
                    }
                }

                updateColumnPosition(colId, col.currentPos, true);
            });

            ['e', 'd', 'p'].forEach(colId => {
                syncCenterWordState(colId);
            });

            if (!hasPendingAnimation) {
                state.animationFrameId = null;
                state.isPlaying = false;

                if (!state.outcomeEffectsPlayed) {
                    state.outcomeEffectsPlayed = true;
                    updateNearMissEffect();
                    checkJackpot(); // 当たり判定
                }

                // 3つ全て停止した2秒後に、英単語ではなくルビを読ませる（読点で区切って自然な間を作る）
                if (state.fullReadTimeout) {
                    clearTimeout(state.fullReadTimeout);
                    state.fullReadTimeout = null;
                }
                state.fullReadTimeout = setTimeout(() => {
                    try {
                        // 全体読み上げは常にMicrosoft Zira（英語）でruby_romanを読む
                        const rE = state.columns['e'].words[state.columns['e'].resultIndex].ruby_roman || '';
                        const rD = state.columns['d'].words[state.columns['d'].resultIndex].ruby_roman || '';
                        const rP = state.columns['p'].words[state.columns['p'].resultIndex].ruby_roman || '';
                        const text = [rE, rD, rP].filter(t => t).join(' ');
                        if (text) speak(text, true);
                    } catch (e) { }
                    state.fullReadTimeout = null;
                }, 2000);
            } else {
                state.animationFrameId = requestAnimationFrame(animationLoop);
            }
        }

        function finalizeStop(colId) {
            const col = state.columns[colId];
            // 停止インデックスを確定 (ループを考慮して元の配列インデックスに丸める)
            const absoluteIndex = Math.round(col.targetPos / ITEM_HEIGHT);
            col.resultIndex = absoluteIndex % col.words.length;
            col.resultWord = col.words[col.resultIndex]?.word || col.targetWord || '';
            col.stoppedWord = col.resultWord;

            // オーバーシュート: 最終位置の少し手前で通り過ぎる表現を実装
            const overshoot = ITEM_HEIGHT * 0.25; // 1/4アイテム分通り過ぎる
            const settleStart = col.targetPos + overshoot; // 最初に表示する位置（少し過ぎた位置）
            const settleEnd = col.targetPos; // 最終正位置

            // 現在の位置から短い前進（overshoot）→ゆっくり戻る2段階アニメに変更
            const currentPos = col.currentPos; // 通常は targetPos
            const forwardDur = 100; // ms: 短く素早く前へ
            const backDur = 300; // ms: ゆっくり戻す
            const forwardStart = performance.now();
            const forwardStartPos = currentPos;
            const forwardDelta = settleStart - forwardStartPos; // 正の値

            if (col.settleAnimId) {
                cancelAnimationFrame(col.settleAnimId);
                col.settleAnimId = null;
            }

            // イージング関数
            const easeOutQuad = t => 1 - (1 - t) * (1 - t);
            const easeOutCubic = t => 1 - Math.pow(1 - t, 3);

            function forwardStep(now) {
                const elapsed = now - forwardStart;
                const t = Math.min(Math.max(elapsed / forwardDur, 0), 1);
                col.currentPos = forwardStartPos + forwardDelta * easeOutQuad(t);
                updateColumnPosition(colId, col.currentPos, true);
                if (t < 1) {
                    col.settleAnimId = requestAnimationFrame(forwardStep);
                } else {
                    // 次は戻るアニメーション
                    const backStart = performance.now();
                    const backStartPos = col.currentPos; // should be settleStart
                    const backDelta = settleEnd - backStartPos; // negative value

                    function backStep(now2) {
                        const elapsed2 = now2 - backStart;
                        const t2 = Math.min(Math.max(elapsed2 / backDur, 0), 1);
                        col.currentPos = backStartPos + backDelta * easeOutCubic(t2);
                        updateColumnPosition(colId, col.currentPos, true);
                        if (t2 < 1) {
                            col.settleAnimId = requestAnimationFrame(backStep);
                        } else {
                            col.settleAnimId = null;
                            // 最終的に厳密な位置に合わせる
                            updateColumnPosition(colId, settleEnd, true);
                            // ルビを表示する
                            const itemEl = document.getElementById(`item-${colId}-${absoluteIndex}`);
                            if (itemEl) itemEl.classList.add('ruby-visible');
                            col.isSettled = true;
                            updateNearMissEffect();
                            // 停止した単語のルビを読み上げ
                            const rubyText = col.words[col.resultIndex] && col.words[col.resultIndex].ruby ? col.words[col.resultIndex].ruby : '';
                            if (rubyText) speak(rubyText);
                        }
                    }
                    col.settleAnimId = requestAnimationFrame(backStep);
                }
            }

            col.settleAnimId = requestAnimationFrame(forwardStep);
        }

        // -----------------------------------------------------------------
        // 6. 音声合成と演出
        // -----------------------------------------------------------------
        function speak(text, useEnglish = false) {
            // null/undefined は何もしない。空文字列は許可して "アンロック" に使える
            if (text == null) return;

            // 強制的に前の音声をキャンセルして新しい発話を優先
            try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch (e) { }

            const u = new SpeechSynthesisUtterance(text === '' ? ' ' : text);

            if (useEnglish) {
                // 当たり演出用: Microsoft Zira (英語) を優先使用
                u.lang = 'en-US';
                u.rate = 0.85;
                u.pitch = 1.0;
                u.volume = 1.0;
                try {
                    const voices = window.speechSynthesis.getVoices();
                    const zira = voices.find(v => v.name.includes('Zira'));
                    const englishVoice = zira || voices.find(v => v.lang === 'en-US') || null;
                    if (englishVoice) u.voice = englishVoice;
                } catch (e) { }
            } else {
                u.lang = CONFIG.sound.voice.lang;
                u.rate = CONFIG.sound.voice.rate;
                u.pitch = CONFIG.sound.voice.pitch;
                u.volume = CONFIG.sound.voice.volume;
            }

            window.speechSynthesis.speak(u);
        }

        // Web Audio API: 簡易的な電子音 (ピッ) を即時再生
        let _audioCtx = null;
        function initAudio() {
            if (_audioCtx) return;
            try {
                _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                _audioCtx = null;
            }
        }

        function playBeep(type = 'stop') {
            initAudio();
            if (!_audioCtx) return;
            // resume していないと iOS 等で鳴らない
            _audioCtx.resume().catch(() => { });

            const now = _audioCtx.currentTime;
            const gain = _audioCtx.createGain();
            const osc = _audioCtx.createOscillator();
            // タイプ毎の音色と長さ
            osc.connect(gain);
            gain.connect(_audioCtx.destination);

            if (type === 'stop') {
                // 低くて長めで力強い "ピッ" (存在感を増す)
                const peak = Math.min(CONFIG.sound.beep.volume * 1.4, 1.0);
                const dur = 0.5; // 長さ
                osc.type = 'sine';
                osc.frequency.setValueAtTime(320, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + dur * 0.6);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(peak, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
                osc.start(now);
                osc.stop(now + dur + 0.02);
            } else if (type === 'lever') {
                const duration = 0.2;
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(90, now);
                osc.frequency.exponentialRampToValueAtTime(55, now + duration);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(CONFIG.sound.beep.volume * 0.95, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.start(now);
                osc.stop(now + duration + 0.02);
            } else if (type === 'jackA' || type === 'jackB') {
                // パチスロ風「キュインキュイーン」2ピーク設計
                // 第1ピーク(急上昇) → ブリッジ(音を切らずに繋ぎ) → 第2ピーク(長く高く) + ビブラート + エコー
                const isA = (type === 'jackA');
                const vol = CONFIG.sound.beep.volume * 0.8; // 全体音量の80%
                const totalDur = 1.85;

                // オシレーター2本（コーラス感）
                const jOsc1 = _audioCtx.createOscillator();
                const jOsc2 = _audioCtx.createOscillator();
                const jGain = _audioCtx.createGain();
                // LFO（ビブラート）
                const jLfo = _audioCtx.createOscillator();
                const jLfoGain = _audioCtx.createGain();
                // ディレイ（エコー）
                const jDelay = _audioCtx.createDelay(1.0);
                const jFeedback = _audioCtx.createGain();
                const jDelayMix = _audioCtx.createGain();

                jOsc1.type = isA ? 'sawtooth' : 'square';
                jOsc2.type = 'sawtooth';

                // --- 周波数スケジュール ---
                const p1Start = isA ? 480 : 520;
                const p1Peak = isA ? 1900 : 2100; // 第1ピーク
                const bridge = isA ? 420 : 460;  // ブリッジ(一時落とす)
                const p2Peak = isA ? 3200 : 3600; // 第2ピーク

                jOsc1.frequency.setValueAtTime(p1Start, now);
                jOsc2.frequency.setValueAtTime(p1Start * 1.006, now);
                // 第1ピーク (0 ~ 0.22s): 急上昇
                jOsc1.frequency.exponentialRampToValueAtTime(p1Peak, now + 0.22);
                jOsc2.frequency.exponentialRampToValueAtTime(p1Peak * 1.006, now + 0.22);
                // ブリッジ (0.22 ~ 0.44s): 一度落とすことで第2ピークの上昇感を際立たせる
                jOsc1.frequency.exponentialRampToValueAtTime(bridge, now + 0.44);
                jOsc2.frequency.exponentialRampToValueAtTime(bridge * 1.006, now + 0.44);
                // 第2ピーク (0.44 ~ 1.6s): 再度急上昇して高域へ
                jOsc1.frequency.exponentialRampToValueAtTime(p2Peak, now + 1.6);
                jOsc2.frequency.exponentialRampToValueAtTime(p2Peak * 1.006, now + 1.6);

                // --- 音量カーブ ---
                // 第1ピーク: フェードイン → ピーク後に絞るがゼロにしない（ブリッジを繋ぐ）
                jGain.gain.setValueAtTime(0.0001, now);
                jGain.gain.linearRampToValueAtTime(vol * 0.9, now + 0.04);      // フェードイン
                jGain.gain.exponentialRampToValueAtTime(vol * 0.06, now + 0.32);// 第1ピーク後に絞る
                jGain.gain.setValueAtTime(vol * 0.06, now + 0.40);              // ブリッジ: 低音量で維持
                // 第2ピーク: 再上昇
                jGain.gain.linearRampToValueAtTime(vol, now + 0.60);
                // フェードアウト
                jGain.gain.exponentialRampToValueAtTime(0.001, now + totalDur);

                // --- LFO（ビブラート）: ブリッジ以降に徐々に深くなる ---
                jLfo.type = 'sine';
                jLfo.frequency.setValueAtTime(5.5, now);
                jLfo.frequency.linearRampToValueAtTime(7.0, now + totalDur);
                jLfoGain.gain.setValueAtTime(0, now);
                jLfoGain.gain.setValueAtTime(0, now + 0.44);           // ブリッジまでは無し
                jLfoGain.gain.linearRampToValueAtTime(isA ? 22 : 28, now + 1.5); // 徐々に深く
                jLfo.connect(jLfoGain);
                jLfoGain.connect(jOsc1.frequency);
                jLfoGain.connect(jOsc2.frequency);

                // --- ディレイ（エコー）: 余韻を出す ---
                jDelay.delayTime.setValueAtTime(0.14, now);
                jFeedback.gain.setValueAtTime(0.38, now);
                jDelayMix.gain.setValueAtTime(0.28, now);
                jDelay.connect(jFeedback);
                jFeedback.connect(jDelay); // フィードバックループ
                jGain.connect(jDelay);
                jDelay.connect(jDelayMix);

                // 接続
                jOsc1.connect(jGain);
                jOsc2.connect(jGain);
                jGain.connect(_audioCtx.destination);
                jDelayMix.connect(_audioCtx.destination);

                jOsc1.start(now);
                jOsc2.start(now + 0.005);
                jLfo.start(now);
                const jStop = now + totalDur + 0.6;
                jOsc1.stop(jStop); jOsc2.stop(jStop); jLfo.stop(jStop);

                setTimeout(() => {
                    try {
                        jOsc1.disconnect(); jOsc2.disconnect(); jGain.disconnect();
                        jLfo.disconnect(); jLfoGain.disconnect();
                        jDelay.disconnect(); jFeedback.disconnect(); jDelayMix.disconnect();
                    } catch (e) { }
                }, (totalDur + 0.9) * 1000);

            } else {
                // デフォルト（短いクリック）
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(CONFIG.sound.beep.volume * 0.6, now + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
                osc.start(now);
                osc.stop(now + 0.12);
            }

            // ノードは自動GCされるが念のため disconnect
            setTimeout(() => { try { osc.disconnect(); gain.disconnect(); } catch (e) { } }, 800);
        }

        function unlockSpeech() {
            // 空の発話で音声許可をトリガー
            try {
                if (window.speechSynthesis) {
                    const u = new SpeechSynthesisUtterance(' ');
                    u.lang = CONFIG.sound.voice.lang;
                    u.rate = CONFIG.sound.voice.rate;
                    u.pitch = CONFIG.sound.voice.pitch;
                    u.volume = 0; // 無音
                    window.speechSynthesis.speak(u);
                }
            } catch (e) { }
            // そしてAudioContextの初期化も。
            initAudio();
        }

        function checkJackpot() {
            const resE = state.columns['e'].resultWord || state.columns['e'].words[state.columns['e'].resultIndex]?.word || '';
            const resD = state.columns['d'].resultWord || state.columns['d'].words[state.columns['d'].resultIndex]?.word || '';
            const resP = state.columns['p'].resultWord || state.columns['p'].words[state.columns['p'].resultIndex]?.word || '';

            const patterns = CONFIG.jackpot.patterns;

            if (resE === patterns[0][0] && resD === patterns[0][1] && resP === patterns[0][2]) {
                playEffect(CONFIG.sound.events.patternA, CONFIG.jackpot.effects.patternA);
            } else if (resE === patterns[1][0] && resD === patterns[1][1] && resP === patterns[1][2]) {
                playEffect(CONFIG.sound.events.patternB, CONFIG.jackpot.effects.patternB);
            }
        }

        function getCenteredWord(colId) {
            const col = state.columns[colId];
            const absIdx = Math.round(col.currentPos / ITEM_HEIGHT);
            const itemEl = document.getElementById(`item-${colId}-${absIdx}`);
            const initial = itemEl?.querySelector('.word-initial')?.textContent || '';
            const rest = itemEl?.querySelector('.word-rest')?.textContent || '';
            return `${initial}${rest}`;
        }

        function syncCenterWordState(colId) {
            const col = state.columns[colId];
            col.centerWord = getCenteredWord(colId);
        }

        function getNearMissColumns() {
            const patterns = [
                ['Electronic', 'Data', 'Processing'],
                ['Echigo', 'Dangerous', 'People']
            ];
            const columns = ['e', 'd', 'p'];

            for (const pattern of patterns) {
                const matchingCols = columns.filter(colId => {
                    const col = state.columns[colId];
                    return col.isStopped && col.resultWord === pattern[columns.indexOf(colId)];
                });

                if (matchingCols.length === 2) {
                    const pendingCol = columns.find(colId => !matchingCols.includes(colId));
                    const pending = pendingCol ? state.columns[pendingCol] : null;
                    if (pending && (pending.isSpinning || (pending.isStopped && !pending.isSettled))) {
                        return matchingCols;
                    }
                }
            }
            return [];
        }

        function updateNearMissEffect() {
            document.querySelectorAll('.stop-btn.button-near-miss').forEach(el => {
                el.classList.remove('button-near-miss');
            });
            document.querySelectorAll('.word-container.near-miss-wobble').forEach(el => {
                el.classList.remove('near-miss-wobble');
            });

            const nearMissColumns = getNearMissColumns();
            if (nearMissColumns.length === 0) return;

            nearMissColumns.forEach(colId => {
                const btn = document.getElementById(`btn-stop-${colId}`);
                if (btn) {
                    btn.classList.add('button-near-miss');
                }

                const col = state.columns[colId];
                const absIdx = Math.round(col.currentPos / ITEM_HEIGHT);
                const itemEl = document.getElementById(`item-${colId}-${absIdx}`);
                const wordContainer = itemEl?.querySelector('.word-container');
                if (wordContainer) {
                    wordContainer.classList.add('near-miss-wobble');
                }
            });
        }

        function glowButtons(patternKey) {
            ['e', 'd', 'p'].forEach(colId => {
                const btn = document.getElementById(`btn-stop-${colId}`);
                if (!btn) return;
                btn.classList.remove('button-win-gold', 'button-win-yellow');
                btn.classList.add('button-win-yellow');
            });
        }

        function restoreOriginalLetters() {
            document.querySelectorAll('.slot-item .word-initial').forEach(el => {
                el.textContent = el.dataset.originalInitial || el.textContent;
            });
            document.querySelectorAll('.slot-item .word-rest').forEach(el => {
                el.textContent = el.dataset.originalRest || el.textContent;
            });
        }

        function playEffect(voiceText, effectConfig) {
            // 音声は個別の停止時・全体読み上げで処理するため、ここでは発話を行わない
            const patternKey = voiceText === CONFIG.sound.events.patternA ? 'patternA' : 'patternB';
            const effectClass = patternKey === 'patternA' ? 'win-gold' : 'win-rainbow';

            // 当たり状態をセット
            state.isWin = true;

            // 画面を白くフラッシュさせる
            triggerWinFlash();

            // アイコンボタンの色を黄色に反転
            const iconImg = document.getElementById('icon-img');
            if (iconImg) iconImg.classList.add('win-color');

            glowButtons(patternKey);
            applyJackpotCenterOnlyEffect();
            ['e', 'd', 'p'].forEach(colId => {
                const col = state.columns[colId];
                const absIdx = Math.round(col.currentPos / ITEM_HEIGHT);
                const el = document.getElementById(`item-${colId}-${absIdx}`);
                if (el) {
                    const textContainer = el.querySelector('.word-container');
                    if (textContainer) {
                        textContainer.classList.add(`effect-${effectConfig.textEffect}`);
                    }
                }
            });
            flashPanels(effectClass);

            // 紙吹雪
            if (effectConfig.useConfetti) {
                startConfetti();
            }

            // キラキラ背景を開始
            startSparkle();

            // 当たり演出音（2ピーク連続「キュインキュイーン」）を少し遅延して再生
            try {
                const beepType = voiceText === CONFIG.sound.events.patternA ? 'jackA' : 'jackB';
                setTimeout(() => playBeep(beepType), 300);
            } catch (e) { }
        }

        function applyJackpotCenterOnlyEffect() {
            ['e', 'd', 'p'].forEach(colId => {
                const col = state.columns[colId];
                const absIdx = Math.round(col.currentPos / ITEM_HEIGHT);
                const items = document.querySelectorAll(`#slot-list-${colId} .slot-item`);
                items.forEach(item => item.classList.remove('jackpot-center-only'));
                const centerItem = document.getElementById(`item-${colId}-${absIdx}`);
                if (centerItem) {
                    items.forEach(item => {
                        if (item !== centerItem) {
                            item.classList.add('jackpot-center-only');
                        }
                    });
                }
            });
        }

        function flashPanels(effectClass) {
            const panels = document.querySelectorAll('.panel-container');
            panels.forEach(panel => {
                panel.classList.remove('win-gold', 'win-rainbow', 'win-white');
                panel.classList.add(effectClass);
            });
            setTimeout(() => {
                panels.forEach(panel => panel.classList.add('win-white'));
            }, 90);
            setTimeout(() => {
                panels.forEach(panel => {
                    panel.classList.remove('win-gold', 'win-rainbow', 'win-white');
                });
            }, 900);
        }

        function resetVisualEffects() {
            document.querySelectorAll('.slot-item').forEach(el => {
                el.classList.remove('ruby-visible', 'jackpot-center-only');
                const tc = el.querySelector('.word-container');
                if (tc) {
                    tc.classList.remove('effect-gold', 'effect-rainbow');
                }
            });

            document.querySelectorAll('.panel-container').forEach(panel => {
                panel.classList.remove('win-gold', 'win-rainbow', 'win-white');
            });

            ['e', 'd', 'p'].forEach(colId => {
                const btn = document.getElementById(`btn-stop-${colId}`);
                if (btn) {
                    btn.classList.remove('button-win-gold', 'button-win-yellow', 'button-near-miss');
                }
            });
            document.querySelectorAll('.word-container.near-miss-wobble').forEach(el => {
                el.classList.remove('near-miss-wobble');
            });
            restoreOriginalLetters();

            // 当たり状態・アイコン・キラキラをリセット
            state.isWin = false;
            const iconImg = document.getElementById('icon-img');
            if (iconImg) iconImg.classList.remove('win-color');
            stopSparkle();

            const wrapper = document.getElementById('app-wrapper');
            if (wrapper) wrapper.classList.remove('screen-shake');
        }

        // -----------------------------------------------------------------
        // 7. 紙吹雪エンジン (Canvas)
        // -----------------------------------------------------------------
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];
        let confettiAnimId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startConfetti() {
            stopConfetti();
            for (let i = 0; i < 300; i++) {
                confettiParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    vy: Math.random() * 3.9 + 2.6,
                    vx: Math.random() * 2 - 1,
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 10 - 5
                });
            }
            renderConfetti();
        }

        function stopConfetti() {
            confettiParticles = [];
            if (confettiAnimId) {
                cancelAnimationFrame(confettiAnimId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;

            confettiParticles.forEach(p => {
                p.y += p.vy;
                p.x += p.vx;
                p.rot += p.rotSpeed;

                if (p.y < canvas.height) active = true;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });

            if (active) {
                confettiAnimId = requestAnimationFrame(renderConfetti);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // -----------------------------------------------------------------
        // 8. 白フラッシュ演出
        // -----------------------------------------------------------------
        function triggerWinFlash() {
            const overlay = document.getElementById('win-flash-overlay');
            if (!overlay) return;
            overlay.classList.remove('win-flash-active');
            void overlay.offsetWidth; // reflowでアニメーションを再起動
            overlay.classList.add('win-flash-active');
        }

        // -----------------------------------------------------------------
        // 9. キラキラエンジン (Canvas)
        // -----------------------------------------------------------------
        const sparkleCanvas = document.getElementById('sparkle-canvas');
        const sparkleCtx = sparkleCanvas ? sparkleCanvas.getContext('2d') : null;
        let sparkleParticles = [];
        let sparkleAnimId = null;

        function resizeSparkleCanvas() {
            if (!sparkleCanvas) return;
            sparkleCanvas.width = window.innerWidth;
            sparkleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeSparkleCanvas);
        resizeSparkleCanvas();

        function startSparkle() {
            stopSparkle();
            if (!sparkleCtx) return;
            for (let i = 0; i < 300; i++) {
                sparkleParticles.push(createSparkleParticle());
            }
            renderSparkle();
        }

        function createSparkleParticle() {
            return {
                x: Math.random() * sparkleCanvas.width,
                y: Math.random() * sparkleCanvas.height,
                size: Math.random() * 12 + 5,
                color: `hsl(${Math.random() * 60 + 30}, 100%, ${Math.random() * 25 + 70}%)`,
                vx: (Math.random() - 0.5) * 1.2,
                vy: (Math.random() - 0.5) * 1.2,
                alpha: Math.random(),
                alphaSpeed: Math.random() * 0.035 + 0.01,
                alphaDir: 1,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.08
            };
        }

        function stopSparkle() {
            sparkleParticles = [];
            if (sparkleAnimId) {
                cancelAnimationFrame(sparkleAnimId);
                sparkleAnimId = null;
            }
            if (sparkleCtx && sparkleCanvas) {
                sparkleCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
            }
        }

        function renderSparkle() {
            if (!sparkleCtx || sparkleParticles.length === 0) return;
            sparkleCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);

            // スロットマシンの領域を描画から除外する (evenodd クリッピング)
            const slotEl = document.getElementById('slot-machine');
            const slotRect = slotEl ? slotEl.getBoundingClientRect() : null;

            sparkleCtx.save();
            if (slotRect) {
                sparkleCtx.beginPath();
                // 全画面の領域
                sparkleCtx.rect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
                // スロットマシンの領域（除外する穴） – 少し拡大してパーティクルが少しはみ出るのも防ぐ
                const pad = 12;
                sparkleCtx.rect(
                    slotRect.left - pad,
                    slotRect.top - pad,
                    slotRect.width + pad * 2,
                    slotRect.height + pad * 2
                );
                sparkleCtx.clip('evenodd');
            }

            sparkleParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.rotSpeed;
                p.alpha += p.alphaSpeed * p.alphaDir;

                // 画面端でループ
                if (p.x < 0) p.x = sparkleCanvas.width;
                if (p.x > sparkleCanvas.width) p.x = 0;
                if (p.y < 0) p.y = sparkleCanvas.height;
                if (p.y > sparkleCanvas.height) p.y = 0;

                // アルファのバウンス
                if (p.alpha >= 1) { p.alpha = 1; p.alphaDir = -1; }
                if (p.alpha <= 0.05) { p.alpha = 0.05; p.alphaDir = 1; }

                // 描画: スター/ダイヤ形
                sparkleCtx.save();
                sparkleCtx.globalAlpha = p.alpha;
                sparkleCtx.translate(p.x, p.y);
                sparkleCtx.rotate(p.rot);
                sparkleCtx.fillStyle = p.color;
                sparkleCtx.shadowColor = p.color;
                sparkleCtx.shadowBlur = p.size * 5;
                sparkleCtx.beginPath();
                sparkleCtx.moveTo(0, -p.size);
                sparkleCtx.lineTo(p.size * 0.35, 0);
                sparkleCtx.lineTo(0, p.size);
                sparkleCtx.lineTo(-p.size * 0.35, 0);
                sparkleCtx.closePath();
                sparkleCtx.fill();
                sparkleCtx.restore();
            });

            sparkleCtx.restore(); // clipを解除

            if (sparkleParticles.length > 0) {
                sparkleAnimId = requestAnimationFrame(renderSparkle);
            }
        }

        // -----------------------------------------------------------------
        // 10. アイコンボタンのクリックハンドラ
        // -----------------------------------------------------------------
        function handleIconClick() {
            const url = state.isWin
                ? 'https://edp.mods.jp/Aprilfool/2025/April-top.html'
                : 'https://edp.mods.jp/';
            window.open(url, '_blank');
        }

        // 初期化実行
        initDOM();

    </script>
</body>
